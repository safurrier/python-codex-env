<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Button Must Be Clicked</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin: 2rem 0;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            border-radius: 10px;
            min-width: 150px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }

        .button-container {
            position: relative;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 2rem 0;
        }

        #theButton {
            padding: 2rem 4rem;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            position: relative;
            transform-origin: center;
        }

        #theButton:hover {
            transform: scale(1.05);
        }

        #theButton:active {
            transform: scale(0.95);
        }

        /* Button color variations */
        .btn-blue { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-gray { background: linear-gradient(135deg, #bdc3c7 0%, #2c3e50 100%); color: white; }
        .btn-orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .btn-purple { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; }
        .btn-red { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); color: white; }
        .btn-yellow { background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%); color: white; }
        .btn-green { background: linear-gradient(135deg, #00d2ff 0%, #3a47d5 100%); color: white; }

        /* Button size variations */
        .btn-tiny {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }
        .btn-small {
            padding: 1rem 2rem;
            font-size: 1.2rem;
        }
        .btn-normal {
            padding: 2rem 4rem;
            font-size: 2rem;
        }
        .btn-large {
            padding: 3rem 6rem;
            font-size: 3rem;
        }
        .btn-huge {
            padding: 4rem 8rem;
            font-size: 4rem;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            75% { transform: translateX(10px) rotate(5deg); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .shake { animation: shake 0.5s ease-in-out infinite; }
        .spin { animation: spin 2s linear infinite; }
        .pulse { animation: pulse 1s ease-in-out infinite; }

        .message {
            margin: 2rem 0;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1.5rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .combo-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: gold;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            opacity: 0;
            animation: comboFade 1s ease-out forwards;
        }

        @keyframes comboFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -100px) scale(1.5); }
            100% { opacity: 0; transform: translate(-50%, -150px) scale(0.8); }
        }

        .reset-btn {
            margin-top: 2rem;
            padding: 1rem 2rem;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .level-indicator {
            color: gold;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 The Button Must Be Clicked 🎮</h1>

        <div class="level-indicator" id="levelIndicator">
            Level 1
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Clicks</div>
                <div class="stat-value" id="clickCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Combo</div>
                <div class="stat-value" id="combo">0</div>
            </div>
        </div>

        <div class="message" id="message">
            Click the button to begin your journey...
        </div>

        <div class="button-container" id="buttonContainer">
            <button id="theButton" class="btn-blue btn-normal">
                Click me! 😊
            </button>
        </div>

        <button class="reset-btn" onclick="resetGame()">
            🔄 Reset Game
        </button>
    </div>

    <script>
        let currentState = {
            clicks: 0,
            score: 0,
            level: 1,
            combo: 0,
            mood: 'cooperative'
        };

        // Sound effects (using Web Audio API)
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playClickSound(success) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            if (success) {
                oscillator.frequency.value = 523.25 + (currentState.level * 50); // C5 + level offset
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            } else {
                oscillator.frequency.value = 200; // Low buzz for failure
                oscillator.type = 'sawtooth';
                gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            }

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }

        function playComboSound(combo) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800 + (combo * 100);
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function updateUI(state) {
            currentState = state;

            document.getElementById('clickCount').textContent = state.clicks;
            document.getElementById('score').textContent = state.score;
            document.getElementById('combo').textContent = state.combo || 0;
            document.getElementById('levelIndicator').textContent = `Level ${state.level} - ${state.mood.toUpperCase()}`;

            const button = document.getElementById('theButton');
            button.textContent = state.button_text;

            // Update button style
            const style = state.button_style;

            // Remove all style classes
            button.className = '';

            // Add color class
            button.classList.add(`btn-${style.color}`);

            // Add size class
            button.classList.add(`btn-${style.size}`);

            // Add animation classes
            if (style.shake) button.classList.add('shake');
            if (style.spin) button.classList.add('spin');

            // Apply opacity
            button.style.opacity = style.opacity;

            // Apply position offset (make button move around)
            button.style.transform = `translate(${style.position_offset.x}px, ${style.position_offset.y}px)`;
        }

        async function clickButton() {
            try {
                const response = await fetch('/api/game/click', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    playClickSound(true);
                    updateUI(data.state);
                    document.getElementById('message').textContent = data.message;

                    // Show combo indicator if combo exists
                    if (data.combo && data.combo > 1) {
                        showComboIndicator(data.combo, data.points);
                        playComboSound(data.combo);
                    }
                } else {
                    playClickSound(false);
                    document.getElementById('message').textContent = data.message;

                    // Shake the button on refusal
                    const button = document.getElementById('theButton');
                    button.style.animation = 'shake 0.5s';
                    setTimeout(() => {
                        button.style.animation = '';
                    }, 500);
                }
            } catch (error) {
                console.error('Error clicking button:', error);
            }
        }

        function showComboIndicator(combo, points) {
            const container = document.getElementById('buttonContainer');
            const indicator = document.createElement('div');
            indicator.className = 'combo-indicator';
            indicator.textContent = `COMBO x${combo}! +${points}`;
            container.appendChild(indicator);

            setTimeout(() => {
                indicator.remove();
            }, 1000);
        }

        async function resetGame() {
            try {
                const response = await fetch('/api/game/reset', {
                    method: 'POST'
                });

                const data = await response.json();

                if (data.success) {
                    updateUI(data.state);
                    document.getElementById('message').textContent = 'Game reset! Click to begin again...';
                }
            } catch (error) {
                console.error('Error resetting game:', error);
            }
        }

        // Initialize game state on load
        async function initGame() {
            try {
                const response = await fetch('/api/game/state');
                const state = await response.json();
                updateUI(state);
            } catch (error) {
                console.error('Error initializing game:', error);
            }
        }

        // Set up button click handler
        document.getElementById('theButton').addEventListener('click', clickButton);

        // Initialize on page load
        initGame();
    </script>
</body>
</html>
